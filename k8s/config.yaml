apiVersion: v1
kind: Secret
metadata:
  name: pastebin-secrets
  namespace: pastebin
type: Opaque
stringData:
  POSTGRES_USER: pastebin
  POSTGRES_PASSWORD: pastebin_secret
  POSTGRES_DB: pastebin
  REDIS_HOST: pastebin-redis
  POSTGRES_SERVER: pastebin-postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pastebin-config
  namespace: pastebin
data:
  REDIS_PORT: "6379"
  POSTGRES_PORT: "5432"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
  PROMETHEUS_ENABLED: "true"
