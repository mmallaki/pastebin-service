apiVersion: apps/v1
kind: Deployment
metadata:
  name: pastebin-backend
  namespace: pastebin
  labels:
    app: pastebin-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pastebin-backend
  template:
    metadata:
      labels:
        app: pastebin-backend
    spec:
      containers:
        - name: backend
          image: pastebin-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_SERVER
              valueFrom:
                secretKeyRef:
                  name: pastebin-secrets
                  key: POSTGRES_SERVER
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pastebin-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pastebin-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pastebin-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: pastebin-config
                  key: POSTGRES_PORT
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: pastebin-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: pastebin-config
                  key: REDIS_PORT
            - name: RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: pastebin-config
                  key: RATE_LIMIT_PER_MINUTE
            - name: RATE_LIMIT_PER_HOUR
              valueFrom:
                configMapKeyRef:
                  name: pastebin-config
                  key: RATE_LIMIT_PER_HOUR
            - name: PROMETHEUS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pastebin-config
                  key: PROMETHEUS_ENABLED
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: pastebin-backend
  namespace: pastebin
spec:
  selector:
    app: pastebin-backend
  ports:
    - port: 8000
      targetPort: 8000
