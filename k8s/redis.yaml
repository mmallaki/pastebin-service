apiVersion: apps/v1
kind: Deployment
metadata:
  name: pastebin-redis
  namespace: pastebin
  labels:
    app: pastebin-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pastebin-redis
  template:
    metadata:
      labels:
        app: pastebin-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: pastebin-redis
  namespace: pastebin
spec:
  selector:
    app: pastebin-redis
  ports:
    - port: 6379
      targetPort: 6379
