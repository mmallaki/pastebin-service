<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pastebin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <nav>
        <a href="#" class="logo" onclick="showView('create')">Pastebin</a>
        <div class="nav-links">
            <a href="#" onclick="showView('create')">New Paste</a>
            <a href="#" onclick="showView('list')">Recent</a>
            <a href="#" onclick="showView('lookup')">View by Key</a>
        </div>
    </nav>

    <main id="app">
        <section id="view-create" class="view active">
            <h2>New Paste</h2>
            <form id="create-form">
                <input type="text" id="title" placeholder="Title (optional)" maxlength="255">
                <div class="form-row">
                    <select id="language"></select>
                    <select id="expiration">
                        <option value="never">Never</option>
                        <option value="10min">10 Minutes</option>
                        <option value="1hr">1 Hour</option>
                        <option value="1day">1 Day</option>
                        <option value="1week">1 Week</option>
                    </select>
                </div>
                <textarea id="content" placeholder="Write or paste your code here... (Tab key works for indentation)" rows="20" spellcheck="false"></textarea>
                <button type="submit">Create Paste</button>
            </form>
        </section>

        <section id="view-paste" class="view">
            <div id="paste-header">
                <h2 id="paste-title"></h2>
                <div class="paste-meta">
                    <span id="paste-lang" class="badge"></span>
                    <span id="paste-date"></span>
                    <span id="paste-views"></span>
                </div>
                <div id="paste-share" class="share-box">
                    <span class="share-label">Share key:</span>
                    <code id="paste-share-key" class="share-key"></code>
                    <button class="btn-small" onclick="copyShareKey()">Copy Key</button>
                    <button class="btn-small" onclick="copyShareLink()">Copy Link</button>
                </div>
                <div class="share-url-box">
                    <input type="text" id="paste-share-url" readonly onclick="this.select(); copyShareLink()">
                    <span class="share-url-hint">click to copy</span>
                </div>
                <div class="paste-actions">
                    <button class="btn-secondary" onclick="startEdit()">Edit</button>
                    <button class="btn-danger" onclick="deletePaste()">Delete</button>
                </div>
            </div>
            <pre><code id="paste-code"></code></pre>
        </section>

        <section id="view-edit" class="view">
            <h2>Edit Paste</h2>
            <form id="edit-form">
                <input type="text" id="edit-title" placeholder="Title (optional)" maxlength="255">
                <div class="form-row">
                    <select id="edit-language"></select>
                </div>
                <textarea id="edit-content" rows="20" spellcheck="false"></textarea>
                <div class="form-row">
                    <button type="submit">Save</button>
                    <button type="button" class="btn-secondary" onclick="viewPaste(currentPasteId)">Cancel</button>
                </div>
            </form>
        </section>

        <section id="view-list" class="view">
            <h2>Recent Pastes</h2>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search pastes..." oninput="debounceSearch()">
            </div>
            <div id="paste-list"></div>
        </section>

        <section id="view-lookup" class="view">
            <h2>View Paste by Key</h2>
            <p class="lookup-hint">Enter a share key to view a paste (e.g., <code>abc123xy</code>)</p>
            <form id="lookup-form" class="lookup-form">
                <input type="text" id="lookup-key" placeholder="Enter share key..." maxlength="8" autocomplete="off" autofocus>
                <button type="submit">View</button>
            </form>
            <div id="lookup-result"></div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
