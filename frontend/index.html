<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pastebin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <main id="app">
        <section id="view-home" class="view active">
            <div class="hero">
                <h1 class="hero-title">Pastebin</h1>
                <p class="hero-desc">Share code, notes, and text snippets with a simple link.</p>
                <div class="hero-actions">
                    <button onclick="showView('create')">New Paste</button>
                    <button class="btn-outline" onclick="showView('lookup')">View Paste</button>
                </div>
            </div>
        </section>

        <section id="view-create" class="view">
            <div class="editor-box">
                <textarea id="content" placeholder="Write or paste your code here..." rows="12" spellcheck="false"></textarea>
            </div>
            <div class="editor-options">
                <input type="text" id="title" placeholder="Title (optional)" maxlength="255">
                <div class="form-row">
                    <select id="language"></select>
                    <select id="expiration">
                        <option value="never">Never</option>
                        <option value="10min">10 Minutes</option>
                        <option value="1hr">1 Hour</option>
                        <option value="1day">1 Day</option>
                        <option value="1week">1 Week</option>
                    </select>
                </div>
                <div class="form-row">
                    <button type="submit" id="create-btn" onclick="handleCreate(event)">Create Paste</button>
                    <button class="btn-outline" onclick="showView('home')">Back</button>
                </div>
            </div>
        </section>

        <section id="view-paste" class="view">
            <div id="paste-header">
                <h2 id="paste-title"></h2>
                <div class="paste-meta">
                    <span id="paste-lang" class="badge"></span>
                    <span id="paste-date"></span>
                    <span id="paste-views"></span>
                </div>
                <div id="paste-share" class="share-box">
                    <span class="share-label">Share key:</span>
                    <code id="paste-share-key" class="share-key"></code>
                    <button class="btn-small" onclick="copyShareKey()">Copy Key</button>
                    <button class="btn-small" onclick="copyShareLink()">Copy Link</button>
                </div>
                <div class="share-url-box">
                    <input type="text" id="paste-share-url" readonly onclick="this.select(); copyShareLink()">
                    <span class="share-url-hint">click to copy</span>
                </div>
                <div class="paste-actions">
                    <button class="btn-secondary" onclick="startEdit()">Edit</button>
                    <button class="btn-danger" onclick="deletePaste()">Delete</button>
                    <button class="btn-outline" onclick="showView('home')">Back</button>
                </div>
            </div>
            <div class="editor-box">
                <pre><code id="paste-code"></code></pre>
            </div>
        </section>

        <section id="view-edit" class="view">
            <div class="editor-box">
                <textarea id="edit-content" rows="12" spellcheck="false"></textarea>
            </div>
            <div class="editor-options">
                <input type="text" id="edit-title" placeholder="Title (optional)" maxlength="255">
                <div class="form-row">
                    <select id="edit-language"></select>
                </div>
                <div class="form-row">
                    <button type="submit" onclick="handleUpdate(event)">Save</button>
                    <button class="btn-outline" onclick="viewPaste(currentPasteId)">Cancel</button>
                </div>
            </div>
        </section>

        <section id="view-lookup" class="view">
            <div class="editor-box">
                <p class="lookup-hint">Enter a share key to view a paste</p>
                <form id="lookup-form" class="lookup-form">
                    <input type="text" id="lookup-key" placeholder="e.g. abc123xy" maxlength="8" autocomplete="off" autofocus>
                    <button type="submit">View</button>
                </form>
                <div id="lookup-result"></div>
                <button class="btn-outline" style="margin-top:12px" onclick="showView('home')">Back</button>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
