<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>Pastebin</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <main id="app">

        <div id="page-home" class="page">
            <div class="center-box">
                <h1>Pastebin</h1>
                <p>Share code and text snippets<br>with a simple link.</p>
                <button onclick="go('create')">New Paste</button>
                <button class="btn-outline" onclick="go('lookup')">View Paste</button>
            </div>
        </div>

        <div id="page-create" class="page">
            <a class="back" href="#">&larr; Home</a>
            <div class="sunken">
                <textarea id="content" placeholder="Write or paste your code here..." rows="10" spellcheck="false"></textarea>
            </div>
            <input type="text" id="title" placeholder="Title (optional)" maxlength="255">
            <div class="row">
                <select id="language"></select>
                <select id="expiration">
                    <option value="never">Never</option>
                    <option value="10min">10 min</option>
                    <option value="1hr">1 hour</option>
                    <option value="1day">1 day</option>
                    <option value="1week">1 week</option>
                </select>
            </div>
            <button id="create-btn" onclick="handleCreate(event)">Create Paste</button>
        </div>

        <div id="page-paste" class="page">
            <a class="back" href="#">&larr; Home</a>
            <h2 id="paste-title"></h2>
            <div class="meta">
                <span id="paste-lang" class="badge"></span>
                <span id="paste-date"></span>
                <span id="paste-views"></span>
            </div>
            <div class="share-row">
                <code id="paste-share-key"></code>
                <button class="sm" onclick="copyKey()">Copy Key</button>
                <button class="sm" onclick="copyLink()">Copy Link</button>
            </div>
            <input type="text" id="paste-share-url" readonly onclick="this.select();copyLink()">
            <div class="sunken">
                <pre><code id="paste-code"></code></pre>
            </div>
            <div class="row">
                <button class="btn-secondary" onclick="startEdit()">Edit</button>
                <button class="btn-danger" onclick="deletePaste()">Delete</button>
            </div>
        </div>

        <div id="page-edit" class="page">
            <a class="back" href="#">&larr; Home</a>
            <h2>Edit</h2>
            <div class="sunken">
                <textarea id="edit-content" rows="10" spellcheck="false"></textarea>
            </div>
            <input type="text" id="edit-title" placeholder="Title" maxlength="255">
            <select id="edit-language"></select>
            <button onclick="handleUpdate(event)">Save</button>
        </div>

        <div id="page-lookup" class="page">
            <a class="back" href="#">&larr; Home</a>
            <div class="center-box" style="padding-top:20vh">
                <h2>View Paste</h2>
                <p>Enter a share key</p>
                <form id="lookup-form" class="lookup-row">
                    <input type="text" id="lookup-key" placeholder="abc123xy" maxlength="8" autofocus>
                    <button type="submit">View</button>
                </form>
                <div id="lookup-result"></div>
            </div>
        </div>

    </main>
    <div id="toast" class="toast"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js?v=4"></script>
</body>
</html>
